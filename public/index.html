<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonChat Pro</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        button { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; font-size: 0.9em; }
        button:active { transform: scale(0.97); }

        #landing-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #0b1120; z-index: 2000; padding: 20px; }
        #landing-screen h1 { font-size: 3.5rem; margin-bottom: 5px; color: #22d3ee; font-weight: 700; letter-spacing: -1px; }
        #landing-screen p { color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem; text-align: center; max-width: 400px; line-height: 1.5;}
        .btn-start { background: #10b981; color: white; font-size: 1.1rem; padding: 16px 35px; border-radius: 50px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); margin-bottom: 30px; }

        #ad-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 17, 32, 0.98); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .ad-box { width: 300px; min-height: 250px; background: transparent; display: flex; justify-content: center; align-items: center; border-radius: 12px; margin-bottom: 30px; overflow: hidden;}
        
        .loader { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .circle { width: 15px; height: 15px; background: #22d3ee; border-radius: 50%; animation: pulse 1.5s infinite ease-in-out; }
        .circle:nth-child(2) { animation-delay: 0.3s; }
        .circle:nth-child(3) { animation-delay: 0.6s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }
        
        #ad-screen h3 { color: #f8fafc; font-weight: 600; font-size: 1.2rem; }

        #chat-wrapper { display: none; flex-direction: column; height: 100vh; }
        .header { background: #161e31; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3a54; }
        .header-logo { color: #22d3ee; font-weight: 700; font-size: 1.1rem; }
        .btn-next { background: #ef4444; color: white; }
        .btn-clear { background: #475569; color: white; }
        #online-users { color: #10b981; font-size: 0.8em; font-weight: 700; }

        #chat-box { flex: 1; padding: 25px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; word-wrap: break-word; line-height: 1.5; font-size: 0.95em; position: relative; }
        .msg.me { background: #06b6d4; align-self: flex-end; color: #0b1120; border-bottom-right-radius: 4px; font-weight: 500; }
        .msg.other { background: #2d3a54; align-self: flex-start; color: #f1f5f9; border-bottom-left-radius: 4px; }
        .msg.system { background: transparent; color: #64748b; text-align: center; align-self: center; font-size: 0.85em; }
        
        .status { font-size: 0.75em; margin-left: 10px; color: #0b1120; opacity: 0.7; font-weight: bold; }
        #typing-indicator { display: none; align-self: flex-start; color: #94a3b8; font-size: 0.85em; font-style: italic; padding: 0 10px; margin-top: -10px; margin-bottom: 8px; }

        .input-area { display: flex; padding: 18px; background: #161e31; border-top: 1px solid #2d3a54; gap: 12px; }
        input { flex: 1; padding: 14px; border: none; border-radius: 12px; background: #0b1120; color: white; outline: none; }
        .btn-send { background: #06b6d4; color: #0b1120; }

        /* حاوية إعلان شاشة البداية */
        .landing-ad { margin-top: 20px; width: 100%; max-width: 320px; min-height: 100px; }
    </style>
</head>
<body>

    <div id="landing-screen">
        <h1>AnonChat</h1>
        <p>Talk to strangers instantly. No logs. No trace.</p>
        <button class="btn-start" onclick="startApp()">Start Chatting Now</button>
        
        <div class="landing-ad">
            <script async="async" data-cfasync="false" src="https://pl28959272.profitablecpmratenetwork.com/d3a75cdd3bc48e5f517b536728a2dc75/invoke.js"></script>
            <div id="container-d3a75cdd3bc48e5f517b536728a2dc75"></div>
        </div>
    </div>

    <div id="ad-screen">
        <div class="ad-box">
            <script type="text/javascript">
                atOptions = {
                    'key' : 'd923f0f562bb1553b763f435469f318d',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/d923f0f562bb1553b763f435469f318d/invoke.js"></script>
        </div>
        <div class="loader">
            <div class="circle"></div><div class="circle"></div><div class="circle"></div>
        </div>
        <h3>Searching for a stranger...</h3>
    </div>

    <div id="chat-wrapper">
        <div class="header">
            <div class="header-logo">AnonChat</div>
            <div id="online-users">🟢 Online: 1</div>
            <div class="header-right">
                <button class="btn-clear" onclick="clearData()">Clear</button>
                <button class="btn-next" onclick="nextPerson()">Skip >></button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div id="typing-indicator">Stranger is typing...</div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Say hello..." onkeypress="handleEnter(event)">
            <button class="btn-send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const landingScreen = document.getElementById('landing-screen');
        const chatWrapper = document.getElementById('chat-wrapper');
        const adScreen = document.getElementById('ad-screen');
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msg-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const onlineUsersDisplay = document.getElementById('online-users');

        let typingTimer;
        let lastMyMsg = null;
        const popSound = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        socket.on('online_count', (count) => {
            onlineUsersDisplay.innerText = `🟢 Online: ${count}`;
        });

        function startApp() {
            landingScreen.style.display = 'none';
            showSearchWithAd();
        }

        function showSearchWithAd() {
            chatWrapper.style.display = 'none';
            adScreen.style.display = 'flex';
            setTimeout(() => {
                adScreen.style.display = 'none';
                chatWrapper.style.display = 'flex';
                socket.emit('find_partner');
            }, 4000); // زدتها لـ 4 ثواني عشان الإعلان يلحق يحمل ويربحك
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        socket.on('waiting', (text) => addMessage(text, 'system'));
        socket.on('chat_start', (text) => { chatBox.innerHTML = ''; addMessage(text, 'system'); popSound.play().catch(()=>{}); });
        socket.on('receive_message', (msg) => { typingIndicator.style.display = 'none'; addMessage(msg, 'other'); popSound.play().catch(()=>{}); socket.emit('seen'); });
        socket.on('partner_seen', () => { if (lastMyMsg) { const s = lastMyMsg.querySelector('.status'); if (s) s.innerText = '✓✓'; } });
        socket.on('partner_left', () => addMessage('Stranger disconnected.', 'system'));

        msgInput.addEventListener('input', () => { socket.emit('typing'); clearTimeout(typingTimer); typingTimer = setTimeout(() => socket.emit('stop_typing'), 1000); });
        socket.on('partner_typing', () => { typingIndicator.style.display = 'block'; chatBox.scrollTop = chatBox.scrollHeight; });
        socket.on('partner_stop_typing', () => typingIndicator.style.display = 'none');

        function sendMessage() {
            const msg = msgInput.value.trim();
            if (msg) {
                lastMyMsg = addMessage(msg, 'me');
                lastMyMsg.innerHTML += '<span class="status">✓</span>';
                socket.emit('send_message', msg);
                msgInput.value = '';
                socket.emit('stop_typing');
            }
        }
        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }
        function nextPerson() { socket.emit('skip'); chatBox.innerHTML = ''; showSearchWithAd(); }
        function clearData() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
